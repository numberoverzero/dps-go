name: check

# get the latest hash for an action within a major version:
#   gh api repos/actions/checkout/git/ref/tags/v6 --jq '.object.sha'
#   gh api repos/actions/setup-go/git/ref/tags/v6 --jq '.object.sha'
#   gh api repos/golangci/golangci-lint-action/git/ref/tags/v9 --jq '.object.sha'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          install-only: true
      - run: make
